name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Проверка стиля кода (линтеры)
  lint:
    name: 🔍 Lint Python code
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: 🎨 Check formatting with Black
        run: |
          black --check exporter/ --line-length 88
      
      - name: 📦 Check imports with isort
        run: |
          isort --check-only exporter/ --profile black
      
      - name: 🔎 Lint with flake8
        run: |
          flake8 exporter/ --max-line-length=88 --extend-ignore=E203,W503

  # 2. Запуск тестов
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r exporter/requirements.txt
          pip install pytest pytest-cov
      
      - name: 🧪 Run tests with coverage
        run: |
          pytest tests/ --cov=exporter --cov-report=term --cov-report=xml
        env:
          SCRAPE_INTERVAL: 10
          EXPORTER_PORT: 8000
          TIMEOUT: 5
      
      - name: 📤 Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # 3. Проверка сборки Docker образа
  docker-build:
    name: 🐳 Build Docker image
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔨 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./exporter
          push: false
          tags: trassir-exporter:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      
      - name: ✅ Test Docker image
        run: |
          docker run --rm trassir-exporter:test python -c "import trassir_exporter; print('OK')"

  # 4. Проверка структуры файлов
  structure:
    name: 📁 Check project structure
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ✅ Check required files exist
        run: |
          # Проверяем наличие обязательных файлов
          for file in README.md LICENSE .env.example docker-compose.yml exporter/requirements.txt exporter/Dockerfile; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"
      
      - name: 🔒 Check .env.example has no real secrets
        run: |
          if grep -E "(password|secret|token|key).*[a-zA-Z0-9]{8,}" .env.example; then
            echo "❌ .env.example may contain real secrets!"
            exit 1
          fi
          echo "✅ .env.example looks safe"
